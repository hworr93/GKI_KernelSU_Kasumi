name: Commit Status Report

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build commit summary
        shell: bash
        env:
          COMMITS_JSON: .github/config/commits.json
        run: |
          set -euo pipefail

          summary_file="$GITHUB_STEP_SUMMARY"

          sanitize_cell() {
            local value="$1"
            value="${value//$'\r'/ }"
            value="${value//$'\n'/ }"
            value="${value//|/\\|}"
            printf '%s' "$value"
          }

          gitlab_commit_message() {
            local sha="$1"
            curl -fsSL "https://gitlab.com/api/v4/projects/simonpunk%2Fsusfs4ksu/repository/commits/${sha}" | jq -r '.message | split("\n")[0]'
          }

          gitlab_latest_commit() {
            local branch="$1"
            curl -fsSL "https://gitlab.com/api/v4/projects/simonpunk%2Fsusfs4ksu/repository/commits?ref_name=${branch}&per_page=1" | jq -r '.[0].id'
          }

          gitlab_latest_message() {
            local branch="$1"
            curl -fsSL "https://gitlab.com/api/v4/projects/simonpunk%2Fsusfs4ksu/repository/commits?ref_name=${branch}&per_page=1" | jq -r '.[0].message | split("\n")[0]'
          }

          github_commit_message() {
            local repo="$1"
            local sha="$2"
            curl -fsSL "https://api.github.com/repos/${repo}/commits/${sha}" | jq -r '.commit.message | split("\n")[0]'
          }

          github_latest_commit() {
            local repo="$1"
            local branch="$2"
            curl -fsSL "https://api.github.com/repos/${repo}/commits/${branch}" | jq -r '.sha'
          }

          github_latest_message() {
            local repo="$1"
            local branch="$2"
            curl -fsSL "https://api.github.com/repos/${repo}/commits/${branch}" | jq -r '.commit.message | split("\n")[0]'
          }

          {
            echo "# Commit Status Report"
            echo ""
            echo "This report shows the pinned commit from this repository and the latest upstream commit for each supported SUSFS branch plus YukiSU and Kasumi."
            echo ""
          } >> "$summary_file"

          {
            echo "## SUSFS"
            echo ""
            echo "| Branch | Current Commit | Current Message | Latest Commit | Latest Message |"
            echo "| --- | --- | --- | --- | --- |"
          } >> "$summary_file"

          while IFS= read -r branch; do
            current_commit="$(jq -r --arg key "$branch" '.susfs[$key]' "$COMMITS_JSON")"
            latest_commit="$(gitlab_latest_commit "$branch")"
            current_message="$(gitlab_commit_message "$current_commit")"
            latest_message="$(gitlab_latest_message "$branch")"

            current_message="$(sanitize_cell "$current_message")"
            latest_message="$(sanitize_cell "$latest_message")"

            printf '| %s | %s | %s | %s | %s |\n' "$branch" "$current_commit" "$current_message" "$latest_commit" "$latest_message" >> "$summary_file"
          done < <(jq -r '.susfs | keys[]' "$COMMITS_JSON" | sort)

          {
            echo ""
            echo "## YukiSU"
            echo ""
            echo "| Branch | Current Commit | Current Message | Latest Commit | Latest Message |"
            echo "| --- | --- | --- | --- | --- |"
          } >> "$summary_file"

          current_yukisu_commit="$(jq -r '.yukisu.main' "$COMMITS_JSON")"
          latest_yukisu_commit="$(github_latest_commit "Anatdx/YukiSU" "main")"
          current_yukisu_message="$(github_commit_message "Anatdx/YukiSU" "$current_yukisu_commit")"
          latest_yukisu_message="$(github_latest_message "Anatdx/YukiSU" "main")"

          current_yukisu_message="$(sanitize_cell "$current_yukisu_message")"
          latest_yukisu_message="$(sanitize_cell "$latest_yukisu_message")"

          printf '| %s | %s | %s | %s | %s |\n' "main" "$current_yukisu_commit" "$current_yukisu_message" "$latest_yukisu_commit" "$latest_yukisu_message" >> "$summary_file"

          {
            echo ""
            echo "## Kasumi"
            echo ""
            echo "| Branch | Current Commit | Current Message | Latest Commit | Latest Message |"
            echo "| --- | --- | --- | --- | --- |"
          } >> "$summary_file"

          current_kasumi_commit="$(jq -r '.kasumi.main' "$COMMITS_JSON")"
          latest_kasumi_commit="$(github_latest_commit "Anatdx/Kasumi" "main")"
          current_kasumi_message="$(github_commit_message "Anatdx/Kasumi" "$current_kasumi_commit")"
          latest_kasumi_message="$(github_latest_message "Anatdx/Kasumi" "main")"

          current_kasumi_message="$(sanitize_cell "$current_kasumi_message")"
          latest_kasumi_message="$(sanitize_cell "$latest_kasumi_message")"

          printf '| %s | %s | %s | %s | %s |\n' "main" "$current_kasumi_commit" "$current_kasumi_message" "$latest_kasumi_commit" "$latest_kasumi_message" >> "$summary_file"