name: Setup Kasumi
description: Download and configure Kasumi as an in-tree kernel module

inputs:
  use_latest_commits:
    description: 'Use the latest commit on the branch instead of the pinned commit'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Ensure kernel directory exists
      shell: bash
      run: mkdir -p "${{ github.workspace }}/kernel"

    - name: Download Kasumi
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KASUMI_REPO="https://github.com/Anatdx/Kasumi.git"
        KASUMI_BRANCH="main"

        if [ "${{ inputs.use_latest_commits }}" = "true" ]; then
          echo "Using latest Kasumi from branch: $KASUMI_BRANCH"
          git clone --depth=50 --branch "$KASUMI_BRANCH" "$KASUMI_REPO" Kasumi
        else
          COMMITS_JSON="${{ github.workspace }}/.github/config/commits.json"
          KASUMI_SETUP_COMMIT=$(jq -er '.kasumi.main' "$COMMITS_JSON")
          echo "Using pinned Kasumi commit: $KASUMI_SETUP_COMMIT"
          git clone "$KASUMI_REPO" Kasumi
          git -C Kasumi fetch --depth=50 origin "$KASUMI_SETUP_COMMIT"
          git -C Kasumi checkout "$KASUMI_SETUP_COMMIT"
        fi

    - name: Integrate Kasumi into Kernel Tree
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      env:
        # Move the Python script to an environment variable to avoid YAML/Python indentation clashes
        PATCH_SCRIPT: |
          import re, sys, os
          path = os.environ.get('BUILD_BAZEL')
          entry = os.environ.get('MODULE_ENTRY')
          print(f"Patching {path} for {entry}")
          with open(path) as f:
              content = f.read()
          if entry in content:
              print("Already present, skipping")
              sys.exit(0)
          idx = content.find('name = "kernel_aarch64"')
          if idx < 0:
              idx = content.find("name = 'kernel_aarch64'")
          if idx >= 0:
              print("Found kernel_aarch64 target")
              line_start = content.rfind('\n', 0, idx) + 1
              build_start = content.rfind('kernel_build(', 0, line_start)
              if build_start >= 0:
                  # Find matching closing ) by tracking depth
                  depth = 0
                  paren_start = content.index('(', build_start)
                  block_end = -1
                  for j in range(paren_start, len(content)):
                      if content[j] == '(':
                          depth += 1
                      elif content[j] == ')':
                          depth -= 1
                          if depth == 0:
                              block_end = j
                              break
                  if block_end >= 0:
                      block_content = content[build_start:block_end+1]
                      if 'module_outs' in block_content:
                          new_block_content = block_content.replace('module_outs = [', 'module_outs = [\n        "' + entry + '",', 1)
                          content = content[:build_start] + new_block_content + content[block_end+1:]
                          with open(path, 'w') as f:
                              f.write(content)
                          print("Appended to existing module_outs")
                          sys.exit(0)
                      else:
                          indent = '    '
                          module_outs = '\n' + indent + 'module_outs = [\n' + indent + '        "' + entry + '",\n' + indent + '],\n'
                          content = content[:block_end] + module_outs + content[block_end:]
                          with open(path, 'w') as f:
                              f.write(content)
                          print("Added module_outs block")
                          sys.exit(0)
          print("WARNING: could not patch module_outs")
      run: |
        set -euo pipefail

        if [ -d "common/drivers" ]; then
          DRIVER_DIR="common/drivers"
        else
          DRIVER_DIR="drivers"
        fi

        echo "Integrating Kasumi into $DRIVER_DIR"
        mkdir -p "$DRIVER_DIR/kasumi"
        cp -r Kasumi/src/. "$DRIVER_DIR/kasumi/"

        # Kleaf/Bazel builds out-of-tree (O=<output_dir>), so $(src) in ccflags-y
        # resolves to a relative path like "drivers/kasumi" that the compiler
        # can't find from the output tree. Use $(srctree)/$(src) for absolute paths.
        sed -i 's|-I$(src)/|-I$(srctree)/$(src)/|g' "$DRIVER_DIR/kasumi/Makefile"

        # Create Kconfig for drivers/kasumi
        T=$'\t'
        cat > "$DRIVER_DIR/kasumi/Kconfig" << EOF
        config KASUMI
        ${T}tristate "Kasumi LKM support"
        ${T}default m
        ${T}help
        ${T}  Enable Kasumi out-of-tree Linux kernel module in-tree.
        EOF

        # Hook into drivers Makefile and Kconfig
        grep -q "kasumi" "$DRIVER_DIR/Makefile" || echo "obj-\$(CONFIG_KASUMI) += kasumi/" >> "$DRIVER_DIR/Makefile"
        grep -q "kasumi" "$DRIVER_DIR/Kconfig" || sed -i '/endmenu/i source "drivers/kasumi/Kconfig"' "$DRIVER_DIR/Kconfig"

        # Change Makefile from obj-m to obj-$(CONFIG_KASUMI)
        sed -i 's/obj-m += kasumi_lkm.o/obj-$(CONFIG_KASUMI) += kasumi_lkm.o/' "$DRIVER_DIR/kasumi/Makefile"

        # Add kasumi_lkm.ko to BUILD.bazel module_outs so Kleaf copies it to output.
        BUILD_BAZEL="${DRIVER_DIR%/drivers}/BUILD.bazel"
        [ "$DRIVER_DIR" = "drivers" ] && BUILD_BAZEL="BUILD.bazel"

        if [ -f "$BUILD_BAZEL" ]; then
          MODULE_ENTRY="drivers/kasumi/kasumi_lkm.ko"
          export BUILD_BAZEL MODULE_ENTRY
          echo "File $BUILD_BAZEL exists, checking for $MODULE_ENTRY..."
          if ! grep -q "$MODULE_ENTRY" "$BUILD_BAZEL" 2>/dev/null; then
            echo "Module not yet in module_outs. Running Python patcher..."
            # Execute the python script defined in the env block
            python3 -c "$PATCH_SCRIPT"
          fi
        else
          echo "WARNING: $BUILD_BAZEL not found"
        fi

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KASUMI=m
