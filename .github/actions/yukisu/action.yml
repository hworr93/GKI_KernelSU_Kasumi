name: Setup YukiSU
description: Download and configure YukiSU with version tracking
inputs:
  use_latest_commits:
    description: 'Use the latest commit on the branch instead of the pinned commit'
    required: false
    default: true

runs:
  using: composite
  steps:
    - name: Ensure kernel directory exists
      shell: bash
      run: mkdir -p "${{ github.workspace }}/kernel"

    - name: Download YukiSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KSU_REPO="https://github.com/Anatdx/YukiSU.git"
        KSU_BRANCH="main"

        if [ "${{ inputs.use_latest_commits }}" = "true" ]; then
          echo "Using latest YukiSU from branch: $KSU_BRANCH"
          curl -LSs "https://raw.githubusercontent.com/Anatdx/YukiSU/main/kernel/setup.sh" | bash -s main
        else
          COMMITS_JSON="${{ github.workspace }}/.github/config/commits.json"
          KSU_SETUP_COMMIT=$(jq -er '.yukisu.main' "$COMMITS_JSON")
          echo "Using pinned YukiSU commit: $KSU_SETUP_COMMIT"
          curl -LSs "https://raw.githubusercontent.com/Anatdx/YukiSU/main/kernel/setup.sh" | bash -s main
          git -C KernelSU fetch --depth=50 origin "$KSU_SETUP_COMMIT"
          git -C KernelSU checkout "$KSU_SETUP_COMMIT"
        fi

    - name: Extract YukiSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        # Extract and export YukiSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.4.0")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((10000 + KSU_GIT_VERSION - 1135))
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

    - name: Integrate YukiSU into BUILD.bazel module_outs
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      env:
        PATCH_SCRIPT: |
          import re, sys, os

          path = os.environ.get('BUILD_BAZEL')
          entry = os.environ.get('MODULE_ENTRY')
          print(f"[yukisu-patch] Patching '{path}' to add '{entry}'")

          if not os.path.isfile(path):
              print(f"[yukisu-patch] ERROR: file not found: {path}", file=sys.stderr)
              sys.exit(1)

          with open(path) as f:
              content = f.read()

          if entry in content:
              print(f"[yukisu-patch] '{entry}' already present, skipping.")
              sys.exit(0)

          # Find where 'name = "kernel_aarch64"' appears
          name_match = re.search(r'name\s*=\s*["\']kernel_aarch64["\']', content)
          if not name_match:
              print(f"[yukisu-patch] ERROR: kernel_aarch64 target not found in {path}", file=sys.stderr)
              sys.exit(1)

          name_pos = name_match.start()

          # Find the kernel_build( that starts BEFORE the name= occurrence
          kb_matches = list(re.finditer(r'^[ \t]*kernel_build\s*\(', content, re.M))
          block_start = None
          for m in reversed(kb_matches):
              if m.start() < name_pos:
                  block_start = m.start()
                  break

          if block_start is None:
              print(f"[yukisu-patch] ERROR: could not locate kernel_build( before kernel_aarch64 name", file=sys.stderr)
              sys.exit(1)

          print(f"[yukisu-patch] Found kernel_build( at offset {block_start}")

          # Walk forward to find matching closing paren
          paren_start = content.index('(', block_start)
          depth = 0
          block_end = -1
          for j in range(paren_start, len(content)):
              if content[j] == '(':
                  depth += 1
              elif content[j] == ')':
                  depth -= 1
                  if depth == 0:
                      block_end = j
                      break

          if block_end < 0:
              print(f"[yukisu-patch] ERROR: unbalanced parentheses in BUILD.bazel", file=sys.stderr)
              sys.exit(1)

          block_content = content[block_start:block_end + 1]
          print(f"[yukisu-patch] kernel_aarch64 block ({len(block_content)} chars):")
          print(block_content[:500])

          # Check if module_outs already exists in this block
          mo_match = re.search(r'(module_outs\s*=\s*\[)', block_content)
          if mo_match:
              # Insert our entry at the start of the list
              insert_at = block_start + mo_match.end()
              new_content = content[:insert_at] + '\n        "' + entry + '",' + content[insert_at:]
              print(f"[yukisu-patch] Inserted into existing module_outs list")
          else:
              # No module_outs attribute — add one just before the closing paren
              mo_block = '\n    module_outs = [\n        "' + entry + '",\n    ],\n'
              new_content = content[:block_end] + mo_block + content[block_end:]
              print(f"[yukisu-patch] Added new module_outs attribute")

          with open(path, 'w') as f:
              f.write(new_content)

          # Verify
          with open(path) as f:
              verify = f.read()
          if entry in verify:
              print(f"[yukisu-patch] SUCCESS: '{entry}' confirmed in {path}")
          else:
              print(f"[yukisu-patch] ERROR: verification failed - entry not found after write!", file=sys.stderr)
              sys.exit(1)
      run: |
        set -euo pipefail

        if [ -d "common/drivers" ]; then
          DRIVER_DIR="common/drivers"
        else
          DRIVER_DIR="drivers"
        fi

        if [ "$DRIVER_DIR" = "common/drivers" ]; then
          BUILD_BAZEL="common/BUILD.bazel"
        else
          BUILD_BAZEL="BUILD.bazel"
        fi

        if [ -f "$BUILD_BAZEL" ]; then
          MODULE_ENTRY="drivers/kernelsu/kernelsu.ko"
          export BUILD_BAZEL MODULE_ENTRY
          echo "BUILD.bazel path: $BUILD_BAZEL"
          echo "Checking for $MODULE_ENTRY in $BUILD_BAZEL ..."
          grep -n "module_outs" "$BUILD_BAZEL" | head -20 || true
          if ! grep -q "$MODULE_ENTRY" "$BUILD_BAZEL" 2>/dev/null; then
            echo "Module not yet in module_outs. Running Python patcher..."
            python3 -c "$PATCH_SCRIPT"
            echo "--- Patched BUILD.bazel kernel_aarch64 section ---"
            grep -A5 'module_outs' "$BUILD_BAZEL" | head -40 || true
          else
            echo "Module entry already present, skipping patch."
          fi
        else
          echo "ERROR: $BUILD_BAZEL not found! Listing kernel dir:"
          ls -la || true
          exit 1
        fi

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=m
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_KRETPROBES=y
          CONFIG_HAVE_SYSCALL_TRACEPOINTS=y
