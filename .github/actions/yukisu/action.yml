name: Setup YukiSU
description: Download and configure YukiSU with version tracking
inputs:
  use_latest_commits:
    description: 'Use the latest commit on the branch instead of the pinned commit'
    required: false
    default: true

runs:
  using: composite
  steps:
    - name: Download YukiSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KSU_REPO="https://github.com/Anatdx/YukiSU.git"
        KSU_BRANCH="main"

        if [ "${{ inputs.use_latest_commits }}" = "true" ]; then
          echo "Using latest YukiSU from branch: $KSU_BRANCH"
          curl -LSs "https://raw.githubusercontent.com/Anatdx/YukiSU/main/kernel/setup.sh" | bash -s main
        else
          COMMITS_JSON="${{ github.workspace }}/.github/config/commits.json"
          KSU_SETUP_COMMIT=$(jq -er '.yukisu.main' "$COMMITS_JSON")
          echo "Using pinned YukiSU commit: $KSU_SETUP_COMMIT"
          curl -LSs "https://raw.githubusercontent.com/Anatdx/YukiSU/main/kernel/setup.sh" | bash -s main
          git -C KernelSU fetch --depth=50 origin "$KSU_SETUP_COMMIT"
          git -C KernelSU checkout "$KSU_SETUP_COMMIT"
        fi

    - name: Extract YukiSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        # Extract and export YukiSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.4.0")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((10000 + KSU_GIT_VERSION - 1135))
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=m
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_KRETPROBES=y
          CONFIG_HAVE_SYSCALL_TRACEPOINTS=y
